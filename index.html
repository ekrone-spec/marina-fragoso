<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Marina Fragoso — Fine Jewelry, New York</title>
  <meta name="description" content="Fine jewelry made in New York City, born of Rio summers and a family of gem cutters. Read the issue — bespoke commissions by appointment." />
  <link rel="preload" href="assets/graphite-nocturne.ttf" as="font" type="font/ttf" crossorigin />
  <link rel="preload" href="assets/cover.jpg" as="image" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-mode="spread">
  <div class="grain" aria-hidden="true"></div>

  <nav id="menu" aria-label="Primary"><!-- built by flip.js --></nav>

  <main id="stage">
    <div id="book" aria-live="off">
      <div class="page-edges left"  id="edgesL" aria-hidden="true"></div>
      <div class="page-edges right" id="edgesR" aria-hidden="true"></div>

      <section class="page left"  id="pageL"></section>
      <section class="page right" id="pageR"></section>

      <div class="seam" aria-hidden="true"></div>

      <div class="leaf" id="leaf" hidden aria-hidden="true">
        <div class="leaf-face front"></div>
        <div class="leaf-face back"></div>
        <div class="leaf-shadow"></div>
      </div>
    </div>

    <button class="edge-tap prev" id="tapPrev" aria-label="Previous page" type="button">‹</button>
    <button class="edge-tap next" id="tapNext" aria-label="Next page" type="button">›</button>
  </main>

  <p id="live" class="sr-only" aria-live="polite"></p>

  <script src="pages.js"></script>
  <script src="flip.js"></script>
  <script>
    // wire the visible prev/next controls (accessibility + obvious affordance)
    document.getElementById('tapNext').addEventListener('click', function () {
      document.dispatchEvent(new KeyboardEvent('keydown', { key: 'ArrowRight' }));
    });
    document.getElementById('tapPrev').addEventListener('click', function () {
      document.dispatchEvent(new KeyboardEvent('keydown', { key: 'ArrowLeft' }));
    });
  </script>
</body>
</html>
