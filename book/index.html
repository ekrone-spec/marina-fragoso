<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Marina Fragoso — Magazine</title>
  <meta name="description" content="Fine jewelry, made in New York. Flip through the issue.">
  <link rel="stylesheet" href="flipbook/flipbook.css">
  <link rel="stylesheet" href="magazine.css">
  <link rel="stylesheet" href="book.css">
</head>
<body>
  <main id="book" aria-label="Marina Fragoso — magazine"></main>

  <script src="vendor/page-flip.browser.js"></script>
  <script src="flipbook/flipbook.js"></script>
  <script>
    // Menu label -> destination page index (built order below)
    var GO = { latest: 1, bespoke: 7, about: 3, shop: 9, contact: 5 };
    var PRODUCT = 11;   // the individual-piece spread

    var SWIPE = '<div class="page-cta"><span class="swipe">Swipe for more →</span></div>';

    function wireChrome(root, isCover) {
      // kicker/logo -> cover
      root.querySelectorAll('.kicker').forEach(function (k) {
        k.setAttribute('data-go', '0'); k.removeAttribute('href');
      });
      // footer menu -> section targets
      root.querySelectorAll('.foot nav a, .back-index a').forEach(function (a) {
        var key = (a.textContent || '').trim().toLowerCase();
        if (GO[key] != null) a.setAttribute('data-go', GO[key]);
      });
      // every product tile / "view" link opens the product page
      root.querySelectorAll('.gg-cell a, .plate-item, .pick-link').forEach(function (a) {
        a.setAttribute('data-go', PRODUCT);
      });
      // CRITICAL: any remaining link/button must also be flagged, otherwise a tap
      // near a page corner starts a fold that wedges mid-peel on mobile.
      root.querySelectorAll('a, button, input').forEach(function (a) {
        if (!a.hasAttribute('data-go')) a.setAttribute('data-inert', '');
        a.removeAttribute('href');
        a.setAttribute('draggable', 'false');
      });
      // swipe hint on each magazine page (mobile only)
      if (!isCover) root.querySelectorAll('.page').forEach(function (p) { p.insertAdjacentHTML('beforeend', SWIPE); });
    }

    function wrap(spread, kind) {
      var fit = document.createElement('div');
      fit.className = 'pgfit ' + kind;
      var clip = document.createElement('div');
      clip.className = 'halfclip ' + kind;
      var clone = spread.cloneNode(true);
      wireChrome(clone, kind === 'cover');
      clip.appendChild(clone);
      fit.appendChild(clip);
      return fit.outerHTML;
    }
    function half(spread, side) { return wrap(spread, side); }
    function coverPage(spread) { return wrap(spread, 'cover'); }

    var BACK = '<div class="pgfit cover"><div class="halfclip cover"><div class="spread t-cover"><section class="page back-cover">' +
      '<a class="kicker" data-go="0"><img class="bc-logo" src="assets/logo.png" alt="Marina Fragoso"></a>' +
      '<p class="bc-end display">the end</p>' +
      '<p class="bc-credit">© <span class="yr"></span> Marina Fragoso. Site by <a href="https://tcstudio.io" target="_blank" rel="noopener">Tree Crown Studio</a>.</p>' +
      '</section></div></div></div>';

    fetch('../layouts/index.html')
      .then(function (r) { return r.text(); })
      .then(function (txt) {
        var doc = new DOMParser().parseFromString(txt, 'text/html');
        var spreads = Array.prototype.slice.call(doc.querySelectorAll('.spread'));
        var pages = [];
        spreads.forEach(function (sp) {
          if (sp.classList.contains('t-cover')) {
            pages.push({ slug: 'cover', html: coverPage(sp) });
          } else {
            var slug = (sp.className.match(/t-([\w]+)/) || [,'pg'])[1];
            pages.push({ slug: slug + '-l', html: half(sp, 'left') });
            pages.push({ slug: slug + '-r', html: half(sp, 'right') });
          }
        });
        pages.push({ slug: 'back', html: BACK });

        var book = new Flipbook('#book', { pages: pages, duration: 900, breakpoint: 1024 });

        // fill year(s)
        document.querySelectorAll('.yr').forEach(function (y) { y.textContent = new Date().getFullYear(); });

        // In-page controls must suppress pointerdown/touchstart/mousedown at CAPTURE
        // phase — otherwise a tap near a page corner starts a fold that wedges
        // mid-peel on mobile. This covers inert links/buttons too, not just [data-go].
        var HIT = '[data-go],[data-inert],a,button,input';
        ['pointerdown', 'touchstart', 'mousedown'].forEach(function (type) {
          document.addEventListener(type, function (e) {
            if (e.target.closest && e.target.closest(HIT)) e.stopPropagation();
          }, true);
        });
        document.addEventListener('click', function (e) {
          var hit = e.target.closest && e.target.closest(HIT);
          if (!hit) return;
          e.stopPropagation();
          var href = hit.getAttribute('href') || '';
          if (/^https?:/.test(href)) return;      // real external link — let it open
          e.preventDefault();
          var go = hit.getAttribute('data-go');
          if (go != null) book.riffleTo(parseInt(go, 10));
        }, true);
        document.addEventListener('dragstart', function (e) { e.preventDefault(); }, true);
      });
  </script>
</body>
</html>
